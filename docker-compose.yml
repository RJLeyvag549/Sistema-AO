services:
  interfaz:
    build: ./interfaz
    container_name: ao_interfaz
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./interfaz:/app
      - /app/node_modules
    networks:
      - ao_pipeline_net
    depends_on:
      - simulador

  simulador:
    build: ./simulador
    container_name: ao_simulador
    ports:
      - "${SIMULADOR_PORT:-5000}:5000"
    volumes:
      - ./simulador:/app
      - shared_data:/app/shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ao_pipeline_net

  inferencia:
    build: ./inferencia
    container_name: ao_inferencia
    runtime: nvidia                          # Fuerza el runtime NVIDIA explícitamente
    environment:
      - NVIDIA_VISIBLE_DEVICES=all           # Expone todas las GPUs al contenedor
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility  # Habilita compute + nvidia-smi
    ports:
      - "${INFERENCIA_PORT:-5001}:5000"
    volumes:
      - ./inferencia:/app
      - shared_data:/app/shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ao_pipeline_net

  controlador:
    build: ./controlador
    container_name: ao_controlador
    ports:
      - "${CONTROLADOR_PORT:-5002}:5000"
    environment:
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-token_provisorio_de_github}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-organizacion_ao}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-telemetria_bucket}
    volumes:
      - ./controlador:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ao_pipeline_net
    depends_on:
      db:
        condition: service_healthy
      inferencia:
        condition: service_started
      simulador:
        condition: service_started

  db:
    image: influxdb:2.7
    container_name: ao_database
    ports:
      - "${DATABASE_PORT:-8086}:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-password_provisorio}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-organizacion_ao}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-telemetria_bucket}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-token_provisorio_de_github}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ao_pipeline_net

volumes:
  shared_data:
  influxdb_data:

networks:
  ao_pipeline_net:
    driver: bridge